<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualización de tu solicitud de venta</title>
</head>
<body style="margin:0;padding:24px;background:#f4f1eb;font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;">
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);">
          <tr>
            <td style="padding:32px 40px;background:#1a1a1a;text-align:center;">
              <p style="margin:0 0 8px 0;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#C8972E;font-weight:700;">CRACK TCG</p>
              <h1 style="margin:0;font-size:28px;line-height:1.2;color:#ffffff;">Solicitud de venta</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 40px;">
              <p style="margin:0 0 12px 0;font-size:15px;line-height:1.7;color:#4b5563;">Hola {{ solicitud.nombre_completo }},</p>
              <p style="margin:0 0 18px 0;font-size:15px;line-height:1.7;color:#4b5563;">{{ mensaje }}</p>
              <p style="margin:0;font-size:13px;color:#6b6560;">Estado actual: <strong style="color:#1a1a1a;">{{ estado }}</strong></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
